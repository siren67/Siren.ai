<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siren Chat v1</title>
    <style>
        body { background: #0b0e11; color: #e1e1e1; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px 16px; border-radius: 15px; max-width: 85%; line-height: 1.4; font-size: 15px; }
        .user { background: #1d4ed8; align-self: flex-end; color: white; border-bottom-right-radius: 2px; }
        .bot { background: #262626; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #404040; }
        #input-area { background: #171717; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; background: #262626; border: 1px solid #404040; color: white; padding: 12px; border-radius: 25px; outline: none; }
        button { background: #2563eb; color: white; border: none; padding: 0 20px; border-radius: 25px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="chat-container">
        <div class="msg bot">System Online. How can I help?</div>
    </div>
    <div id="input-area">
        <input type="text" id="userInput" placeholder="Type here...">
        <button onclick="askSiren()">Send</button>
    </div>
    <script src="script.js"></script>
</body>
  </html>
